name: Monitor and Retrain

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  monitor-and-retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install "numpy==1.26.4"
          pip install --no-deps "evidently==0.4.16"
          pip install pandas "scikit-learn==1.6.1" mlflow kaggle xgboost scipy statsmodels pydantic PyYAML requests rich typer typing-inspect uvicorn watchdog plotly nltk fsspec litestar dynaconf iterative-telemetry
          pip install "numpy==1.26.4" --force-reinstall
          python3 -c "import nltk; nltk.download('words'); nltk.download('wordnet')"

      - name: Verify numpy version
        run: python3 -c "import numpy; print('numpy:', numpy.__version__)"

      - name: Set up Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Run drift monitor
        run: python3 monitor/monitor.py

      - name: Run retrain if drift detected
        run: python3 retrain/retrain.py

      - name: Commit new model if retrained
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add models/model.pkl models/preprocessor.pkl models/feature_metadata.json || true
          git diff --staged --quiet || git commit -m "retrain: new model after drift detected"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}